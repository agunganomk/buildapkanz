name: Flutter Build
on:
  workflow_dispatch:
    inputs:
      release_url:
        required: true
      tag:
        required: true
      build_type:
        default: release
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      - name: Download & Build
        run: |
          curl -L -o source.zip "${{ github.event.inputs.release_url }}/download/source.zip"
          unzip source.zip -d project
          cd project
          flutter pub get
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: project/build/app/outputs/flutter-apk/*.apk
