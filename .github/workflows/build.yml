name: Flutter Build
on:
  workflow_dispatch:
    inputs:
      release_url:
        description: 'Release URL (download link)'
        required: true
      tag:
        description: 'Release Tag'
        required: true
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Download & Build
        run: |
          echo "📥 Downloading from: ${{ github.event.inputs.release_url }}"
          curl -L -o source.zip "${{ github.event.inputs.release_url }}"
          
          # Cek file
          echo "🔍 Checking file..."
          file source.zip
          ls -la source.zip
          
          # Coba unzip
          echo "📦 Extracting..."
          unzip -o source.zip -d project || {
            echo "❌ Failed to unzip!"
            cat source.zip
            exit 1
          }
          
          cd project
          echo "📂 Contents:"
          ls -la
          
          echo "📦 Getting dependencies..."
          flutter pub get || {
            echo "❌ Flutter pub get failed!"
            exit 1
          }
          
          echo "🔨 Building APK..."
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi
      
      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: project/build/app/outputs/flutter-apk/*.apk
