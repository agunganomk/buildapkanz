name: Flutter Build
on:
  workflow_dispatch:
    inputs:
      release_url:
        description: 'Release URL'
        required: true
      tag:
        description: 'Release Tag'
        required: true
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      # 🔥 PAKE FLUTTER MASTER (VERSI PALING BARU)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'  # ← PAKE MASTER
      
      - name: Download & Build
        run: |
          echo "📥 Download: ${{ github.event.inputs.release_url }}"
          curl -L -o source.zip "${{ github.event.inputs.release_url }}"
          
          echo "📦 Extracting..."
          unzip -o source.zip -d project
          
          cd project
          
          # 🔥 CETAK VERSI UNTUK DEBUG
          echo "📦 Flutter version:"
          flutter --version
          
          echo "📦 Getting dependencies..."
          flutter pub get || {
            echo "❌ Flutter pub get failed!"
            echo "📋 Trying alternative..."
            flutter pub get --offline || exit 1
          }
          
          echo "🔨 Building APK..."
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi
      
      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: project/build/app/outputs/flutter-apk/*.apk
