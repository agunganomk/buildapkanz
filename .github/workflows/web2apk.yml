name: Web2Apk Build

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Website URL'
        required: true
      app_name:
        description: 'App Name'
        required: true
      icon_url:
        description: 'Icon URL'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install web2apk
        run: npm install -g web2apk-cli
      
      - name: Build APK
        run: |
          web2apk build \
            --url "${{ github.event.inputs.web_url }}" \
            --name "${{ github.event.inputs.app_name }}" \
            --icon "${{ github.event.inputs.icon_url }}" \
            --output ./app.apk
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: ./app.apk
