name: Flutter Build
on:
  workflow_dispatch:
    inputs:
      release_url:
        required: true
      tag:
        required: true
      build_type:
        default: release
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      - name: Download & Build
        run: |
          curl -L -o source.zip "${{ github.event.inputs.release_url }}/download/source.zip"
          unzip source.zip -d project
          cd project
          flutter pub get
          flutter build apk ${{
            github.event.inputs.build_type == 'debug' && '--debug' || '--release'
          }}
      - uses: actions/upload-artifact@v3
        with:
          name: app
          path: project/build/app/outputs/flutter-apk/*.apk
